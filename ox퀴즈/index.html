<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>데이터담당 운동회 OX 퀴즈</title>
    <!-- CSS Load -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        
        <!-- 대기 화면 (타이틀) -->
        <div id="screen-wait" class="screen">
            <h1 class="title" style="font-size: 2.5rem; margin-bottom: 0;">2026 데이터담당 운동회</h1>
            <h2 class="title" style="font-size: 5rem; margin-bottom: 2rem; color: var(--secondary-accent); -webkit-text-fill-color: var(--secondary-accent);">OX 퀴즈쇼</h2>
            <p style="font-size: 1.5rem; margin-bottom: 3rem; color: var(--text-muted);">진행자의 안내에 따라 O, X 진영으로 이동할 준비를 해주세요!<br>10초의 시간이 주어집니다.</p>
            <button id="btn-start-quiz" class="primary" style="font-size: 2.5rem; padding: 1.5rem 4rem;">퀴즈 시작</button>
        </div>

        <!-- 문제 화면 -->
        <div id="screen-question" class="screen hidden">
            <div class="header">
                <h2 id="question-number" class="question-number">Q1.</h2>
            </div>
            <div id="question-content" class="question-content">
                문제 로딩중...
            </div>
            
            <div class="timer-container">
                <div id="timer" class="timer">10</div>
                <div class="progress-track">
                    <div id="timer-bar" class="progress-bar"></div>
                </div>
            </div>

            <div class="controls">
                <button id="btn-start-timer" class="primary">10초 타이머 시작</button>
                <button id="btn-reveal-answer" class="success hidden">정답 공개하기</button>
            </div>
        </div>

        <!-- 정답 화면 -->
        <div id="screen-answer" class="screen hidden">
            <div class="answer-display">
                <div id="answer-mark" class="answer-mark">O</div>
                <div id="explanation" class="explanation">해석이 들어가는 공간입니다.</div>
            </div>

            <div class="controls">
                <button id="btn-next-question" class="primary">다음 문제</button>
            </div>
        </div>
        
        <!-- 종료 화면 -->
        <div id="screen-end" class="screen hidden">
            <h1 class="title" style="font-size: 4rem; margin-bottom: 2rem; color: var(--secondary-accent); -webkit-text-fill-color: var(--secondary-accent);">퀴즈 종료</h1>
            <p style="font-size: 2rem; margin-bottom: 3rem;">모든 문제가 끝났습니다!<br>마지막까지 살아남은 분들 축하드립니다 🎉</p>
            <button id="btn-restart" class="primary" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); box-shadow: none;">처음부터 다시하기</button>
        </div>

    </div>

    <!-- 스크립트 연결. 순서 중요: 데이터가 먼저 로드되어야 함 -->
    <script src="questions.js"></script>
    <script src="script.js"></script>
</body>
</html>
